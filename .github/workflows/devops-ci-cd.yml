name: Reusable CI/CD - Workflow for Build, Scan, Release, and Deploy

# Application Platform owns the reusable workflow contract, job graph, permissions, and stage order.
# DevOps-owned composite actions implement repeated step logic only.
on:
  workflow_call:
    inputs:
      project-path:
        type: string
        required: true
      java-version:
        type: string
        required: true
      build-command:
        type: string
        required: true
      artifact-name:
        type: string
        required: true      
    outputs:
      artifact-name:
        description: Build artifact name used by downstream jobs.
        value: ${{ jobs.build.outputs['artifact-name'] }}      

permissions:
  contents: read

jobs:
  prebuild:
    name: PREBUILD
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: tag-build-uid
        run: echo "Tagging build with UID..."
      - name: ecr-tag-check
        run: echo "Checking ECR tag..."
  build:
    name: BUILD    
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ inputs['artifact-name'] }}
      artifact-path: ${{ steps.build.outputs['artifact-path'] }}
    permissions:
      contents: read
    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        
      - name: Build artifact
        id: build
        uses: vrcmaction/devops-reusable-workflows/.github/actions/devops-build@master
        with:
          project-path: ${{ inputs['project-path'] }}
          java-version: ${{ inputs['java-version'] }}
          build-command: ${{ inputs['build-command'] }}
          artifact-name: ${{ inputs['artifact-name'] }}
      - name: Upload build artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ inputs['artifact-name'] }}
          path: ${{ steps.build.outputs['artifact-path'] }}
          if-no-files-found: error

  scan:
    name: Platform - Scan artifact
    runs-on: ubuntu-latest
    needs: prebuild
    steps:
     - name: Run scan
       run: echo "Scanning artifact..."
